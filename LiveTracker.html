<!DOCTYPE html>
<html>
<head>
    <title>Women Safety SOS - Professional Tracker</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; }
        h1 { margin-top: 20px; color: #f87171; text-transform: uppercase; letter-spacing: 2px; }
        
        #map { height: 450px; width: 95%; max-width: 1100px; border-radius: 15px; border: 3px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .dashboard { display: flex; gap: 20px; margin: 20px; flex-wrap: wrap; justify-content: center; }
        .card { background: #1e293b; padding: 15px 25px; border-radius: 12px; border: 1px solid #334155; text-align: center; min-width: 200px; }
        .card span { display: block; font-size: 14px; color: #94a3b8; margin-bottom: 5px; }
        .card b { font-size: 18px; color: #38bdf8; }

        .btn-google {
            margin-top: 20px; padding: 12px 25px; background: #2563eb; color: white; 
            text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s;
            display: inline-block; box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
        }
        .btn-google:hover { background: #1d4ed8; transform: translateY(-2px); }
        
        .footer { margin-top: 30px; font-size: 12px; color: #475569; }
    </style>
</head>
<body>

    <h1>🚨 SOS Emergency Live Feed 🚨</h1>

    <div class="dashboard">
        <div class="card">
            <span>Current Status</span>
            <b id="status">Searching Cloud...</b>
        </div>
        <div class="card">
            <span>Last Updated At</span>
            <b id="last-time">--:--:--</b>
        </div>
        <div class="card">
            <span>Coordinates</span>
            <b id="coords">0.00, 0.00</b>
        </div>
    </div>

    <div id="map"></div>

    <a id="google-link" href="#" target="_blank" class="btn-google">📍 Open in Google Maps</a>

    <div class="footer">Project: IoT Based Women Safety System</div>

    <script>
        // --- APNI DETAILS YAHAN DALO ---
        var channelID = "3315108"; 
        var readKey = "MHT6E32O3ZGRIAWH";
        // ------------------------------

        var map = L.map('map').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker = L.marker([0, 0]).addTo(map);

        function fetchData() {
            var url = `https://api.thingspeak.com/channels/${channelID}/feeds/last.json?api_key=${readKey}`;
            
            $.getJSON(url, function(data) {
                var lat = parseFloat(data.field1);
                var lng = parseFloat(data.field2);
                var timestamp = new Date(data.created_at).toLocaleString(); // Time format

                if(!isNaN(lat) && !isNaN(lng) && lat != 0) {
                    var pos = [lat, lng];
                    marker.setLatLng(pos);
                    map.setView(pos, 16);
                    
                    // UI Updates
                    document.getElementById('coords').innerHTML = lat.toFixed(5) + ", " + lng.toFixed(5);
                    document.getElementById('status').innerHTML = "🟢 Device Online";
                    document.getElementById('last-time').innerHTML = timestamp;
                    
                    // Google Maps Button Update
                    document.getElementById('google-link').href = `https://www.google.com/maps?q=${lat},${lng}`;
                } else {
                    document.getElementById('status').innerHTML = "🟠 Waiting for GPS...";
                }
            }).fail(function() {
                document.getElementById('status').innerHTML = "🔴 Connection Error";
            });
        }

        // 5 second refresh
        setInterval(fetchData, 5000);
        fetchData();
    </script>
</body>
</html>
